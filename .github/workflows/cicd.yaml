name: Deploy Application Docker Image to EC2 instance

on:
  push:
    branches: [main]


jobs:
  Continuous-Integration:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPO }}
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .  
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "::set-output name=image::$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

  Continuous-Deployment:
    needs: Continuous-Integration
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Run Docker Image to serve users
        run: |
          docker stop veridoc-backend || true
          docker rm veridoc-backend || true
          docker run -d \
            --name veridoc-backend \
            -p 8000:8000 \
            -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            -e AWS_DEFAULT_REGION="${{ secrets.AWS_DEFAULT_REGION }}" \
            -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            -e LLM_PROVIDER="${{ secrets.LLM_PROVIDER }}" \
            -e LLM_MODEL="${{ secrets.LLM_MODEL }}" \
            -e LLM_TEMPERATURE="${{ secrets.LLM_TEMPERATURE }}" \
            -e LLM_MAX_TOKENS="${{ secrets.LLM_MAX_TOKENS }}" \
            -e EMBEDDINGS_MODEL="${{ secrets.EMBEDDINGS_MODEL }}" \
            -e EMBEDDINGS_DIMENSION="${{ secrets.EMBEDDINGS_DIMENSION }}" \
            -e VECTOR_DB="${{ secrets.VECTOR_DB }}" \
            -e CHROMA_PERSIST_DIR="${{ secrets.CHROMA_PERSIST_DIR }}" \
            -e FAISS_INDEX_DIR="${{ secrets.FAISS_INDEX_DIR }}" \
            -e CHUNK_SIZE="${{ secrets.CHUNK_SIZE }}" \
            -e CHUNK_OVERLAP="${{ secrets.CHUNK_OVERLAP }}" \
            -e TOP_K="${{ secrets.TOP_K }}" \
            -e HYBRID_SEARCH_ENABLED="${{ secrets.HYBRID_SEARCH_ENABLED }}" \
            -e BM25_WEIGHT="${{ secrets.BM25_WEIGHT }}" \
            -e API_HOST="0.0.0.0" \
            -e API_PORT="8000" \
            -e API_RELOAD="false" \
            -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            -e JWT_ALGORITHM="${{ secrets.JWT_ALGORITHM }}" \
            -e JWT_EXPIRATION_HOURS="${{ secrets.JWT_EXPIRATION_HOURS }}" \
            -e JWT_EXPIRATION_MINUTES="${{ secrets.JWT_EXPIRATION_MINUTES }}" \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            -e DATABASE_ECHO="${{ secrets.DATABASE_ECHO }}" \
            -e DATABASE_NAME="${{ secrets.DATABASE_NAME }}" \
            -e RAGAS_BATCH_SIZE="${{ secrets.RAGAS_BATCH_SIZE }}" \
            -e EVALUATION_SAMPLE_SIZE="${{ secrets.EVALUATION_SAMPLE_SIZE }}" \
            -e MONGODB_URL="${{ secrets.MONGODB_URL }}" \
            -e LOG_LEVEL="${{ secrets.LOG_LEVEL }}" \
            -e GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
            -e VITE_GOOGLE_CLIENT_ID="${{ secrets.VITE_GOOGLE_CLIENT_ID }}" \
            -e CLOUDINARY_CLOUD_NAME="${{ secrets.CLOUDINARY_CLOUD_NAME }}" \
            -e CLOUDINARY_API_KEY="${{ secrets.CLOUDINARY_API_KEY }}" \
            -e CLOUDINARY_API_SECRET="${{ secrets.CLOUDINARY_API_SECRET }}" \
            "${{ steps.login-ecr.outputs.registry }}"/"${{ secrets.ECR_REPO }}":latest